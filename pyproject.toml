[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "Kirilltools"
version = "0.3.0-alpha9"
description = "6 добавлений 2 удаления"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "GPL-3.0-or-later"}
authors = [
  {name = "kirill1943"}
]
dependencies = [
    "httpx",
    "h11",
    "httpcore",
    "anyio",
    "psutil",
    "rich",
    "markdown-it-py",
    "pygments"
]

[tool.setuptools]
packages = ["kirilltools"]
